# === HTTP → HTTPS redirect + Let's Encrypt ===
server {
    listen 80;
    server_name crm.satistang.com smlclaw.satistang.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# === HTTPS — SML Mini CRM ===
server {
    listen 443 ssl;
    http2 on;
    server_name crm.satistang.com smlclaw.satistang.com;

    # SSL Certificate (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/crm.satistang.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.satistang.com/privkey.pem;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # === LINE Webhook ===
    location /webhook {
        limit_req zone=webhook burst=50 nodelay;
        proxy_pass http://agent;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === Meta Webhook (Facebook + Instagram) ===
    location /webhook/meta {
        limit_req zone=webhook burst=50 nodelay;
        proxy_pass http://agent;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === Dashboard (Next.js — web app หลัก) ===
    location /dashboard {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # === NextAuth (Google OAuth callback) ===
    location /dashboard/api/auth {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === Advisor API (OpenClaw เรียก) ===
    location /api/advisor/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://agent;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === Costs API ===
    location /api/costs {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://agent;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # === Root → redirect ไป Dashboard ===
    location = / {
        return 302 /dashboard;
    }

    # === Agent Health (internal) ===
    location /agent-health {
        proxy_pass http://agent/;
    }

    location / {
        return 404;
    }
}
