services:
  # === OpenClaw — AI Advisor (แกนหลัก) ===
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: smltrack-openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      - ./openclaw:/home/node/.openclaw
    env_file:
      - .env
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - TZ=Asia/Bangkok
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - SAMBANOVA_API_KEY=${SAMBANOVA_API_KEY:-}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    command: ["node", "openclaw.mjs", "gateway", "--bind", "lan", "--port", "18789"]
    depends_on:
      - agent
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # === AI Agent (LINE + RAG + MCP + Analytics) ===
  agent:
    build: ./proxy
    container_name: smltrack-agent
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - MCP_ERP_URL=http://host.docker.internal:8888/goapi/mcp/sse
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s

  # === Dashboard (Next.js) ===
  dashboard:
    build: ./smltrackdashboard
    container_name: smltrack-dashboard
    restart: unless-stopped
    ports:
      - "3002:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - AGENT_URL=http://agent:3000
    depends_on:
      - agent

  # === Cloudflare Named Tunnel (URL คงที่) ===
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: smltrack-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - agent
      - dashboard
