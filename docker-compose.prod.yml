# ==============================================
# SMLTrack Production — Hetzner VPS
# ใช้: docker compose -f docker-compose.prod.yml up -d
# ==============================================

services:
  # === Nginx Reverse Proxy + SSL ===
  nginx:
    image: nginx:alpine
    container_name: smltrack-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - agent
      - dashboard
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s

  # === SSL Certificate (Let's Encrypt) ===
  certbot:
    image: certbot/certbot:latest
    container_name: smltrack-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"

  # === OpenClaw — AI Advisor (แกนหลัก) ===
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: smltrack-openclaw
    restart: always
    volumes:
      - ./openclaw:/home/node/.openclaw
    env_file:
      - .env
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - TZ=Asia/Bangkok
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - SAMBANOVA_API_KEY=${SAMBANOVA_API_KEY:-}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    command: ["node", "openclaw.mjs", "gateway", "--bind", "lan", "--port", "18789"]
    depends_on:
      - agent
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # === AI Agent (LINE + RAG + MCP + Analytics) ===
  agent:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: smltrack-agent
    restart: always
    env_file:
      - .env
    environment:
      - PORT=3000
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # === Dashboard (Next.js) ===
  dashboard:
    build:
      context: ./smltrackdashboard
      dockerfile: Dockerfile.prod
    container_name: smltrack-dashboard
    restart: always
    env_file:
      - .env
    environment:
      - PORT=3001
      - NODE_ENV=production
      - AGENT_URL=http://agent:3000
    depends_on:
      - agent
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/dashboard"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # === Watchtower — Auto-update images ===
  watchtower:
    image: containrrr/watchtower:latest
    container_name: smltrack-watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400
      - WATCHTOWER_LABEL_ENABLE=false
      - TZ=Asia/Bangkok
    command: smltrack-openclaw smltrack-nginx

volumes:
  certbot-etc:
  certbot-var:
  certbot-webroot:
